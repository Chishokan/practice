<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <!-- viewport-fit=cover は iPhone のノッチの内側まで背景を伸ばすため -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>ウィンターカップへの道</title>

  <!-- スマホのホーム画面に追加したとき、アプリのように開く -->
  <meta name="theme-color" content="#12151c">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="WCへの道">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="images/akaboshi.png">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="header">
    <h1>🏀 ウィンターカップへの道</h1>
    <div class="date-box">
      <span id="date-label">4月 1週目</span>
      <span id="weeks-left" class="weeks-left"></span>
    </div>

    <!-- セーブもここから。入口を1つにまとめる。 -->
    <button id="burger" class="burger">☰ メニュー</button>
  </header>

  <!-- 年間カレンダー。先の行事が見えるから、計画が立てられる -->
  <section class="panel calendar-panel">
    <h2>年間カレンダー</h2>
    <div id="calendar" class="calendar"></div>
  </section>

  <!-- 練習盤。毎週ここで1つ選ぶ。このゲームの中心。
       今週の状況（行事・バフ・出来事）は、選ぶ前に読めるよう真上に置く。 -->
  <section class="panel train-panel">
    <h2>今週の練習<span class="train-hint" id="train-hint">1つ選ぶと1週間進みます</span></h2>

    <div id="upcoming"></div>
    <div id="event-banner" class="event-banner hidden"></div>

    <div id="menu-list" class="train-board"></div>
  </section>

  <!-- 活動記録。毎週いちばん読むものなので、カレンダーの下に大きく置く -->
  <section class="panel log-panel">
    <h2>活動記録</h2>
    <div class="log-layout">
      <!-- 三宅の今週のひとこと -->
      <div id="manager-comment" class="manager-comment"></div>
      <div id="log" class="log"></div>
    </div>
  </section>

  <main class="layout">

    <!-- 左：部員一覧 -->
    <section class="panel">
      <h2>部員一覧</h2>
      <div id="roster" class="roster"></div>
    </section>

    <!-- 右：週の進行・一括設定・メニュー表・ログ -->
    <aside class="panel">
      <h2>特殊戦術</h2>
      <div id="tactic-progress"></div>

    </aside>

  </main>

  <!-- 試合画面。ふだんは隠れていて、試合のときだけ前面に出る -->
  <div id="match-overlay" class="overlay hidden">
    <div class="match-panel" id="match-panel"></div>
  </div>

  <!-- 戦歴 -->
  <div id="history-overlay" class="overlay hidden">
    <div class="match-panel" id="history-panel"></div>
  </div>

  <!-- 選択式イベント。選ぶまで先に進めない -->
  <div id="choice-overlay" class="overlay hidden">
    <div class="choice-panel" id="choice-panel"></div>
  </div>

  <!-- 月頭のメインストーリー。読ませたいので画面の前に出す -->
  <div id="story-overlay" class="overlay hidden">
    <div class="choice-panel story-panel" id="story-panel"></div>
  </div>

  <!-- 選手詳細（マネージャーの手帳） -->
  <div id="profile-overlay" class="overlay hidden">
    <div class="match-panel" id="profile-panel"></div>
  </div>

  <!-- エンディング。1年の終わりに1度だけ -->
  <div id="ending-overlay" class="overlay hidden">
    <div class="ending-panel" id="ending-panel"></div>
  </div>

  <!-- イベント履歴 -->
  <div id="gallery-overlay" class="overlay hidden">
    <div class="match-panel" id="gallery-panel"></div>
  </div>

  <!-- クオーター間の作戦タイム。試合中だけ、前面に出る。 -->
  <div id="qchoice-overlay" class="overlay hidden">
    <div class="choice-panel qchoice-panel" id="qchoice-panel"></div>
  </div>

  <!-- バーガーメニュー -->
  <nav id="menu-drawer" class="drawer hidden">
    <div class="drawer-panel">
      <div class="drawer-head">
        <span id="drawer-date">4月 1週目</span>
        <button class="close-btn" id="drawer-close">✕</button>
      </div>

      <button class="drawer-item main" id="menu-match">🏀 練習試合を組む（1週）</button>
      <button class="drawer-item" id="menu-gallery">📖 イベント履歴</button>
      <button class="drawer-item" id="menu-notebook">📔 三宅の手帳</button>
      <button class="drawer-item" id="menu-history">📊 戦歴</button>

      <div class="drawer-sep"></div>

      <div class="drawer-save">
        <span id="save-info" class="save-info">セーブなし</span>
      </div>
      <button class="drawer-item sub" id="menu-save">💾 セーブする</button>
      <button class="drawer-item sub" id="menu-load">📂 セーブから再開</button>
      <button class="drawer-item sub danger" id="menu-reset">↺ 最初からやり直す</button>
    </div>
  </nav>

  <!-- 読み込む順番に意味がある。
       game.js が土台（選手データと週の進行）、
       events.js と match.js はその上で動く。
       history.js は記録を見せるだけなので最後。 -->
  <script src="game.js"></script>
  <script src="events.js"></script>
  <script src="match.js"></script>
  <script src="history.js"></script>
  <script src="profile.js"></script>
  <script src="subevents.js"></script>
  <script src="gallery.js"></script>
  <script src="ending.js"></script>
</body>
</html>
